name: Jio RAG — CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip uv
        uv pip install -r requirements.txt --system

    # Spin up a mock Ollama endpoint so database.py import-time health checks don't fail.
    # The actual /api/tags route just needs to return HTTP 200.
    - name: Start mock Ollama server
      run: |
        python -c "
        from http.server import HTTPServer, BaseHTTPRequestHandler
        import threading, json
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(json.dumps({'models': []}).encode())
            def log_message(self, *a): pass
        srv = HTTPServer(('0.0.0.0', 11434), H)
        t = threading.Thread(target=srv.serve_forever, daemon=True)
        t.start()
        import time; time.sleep(86400)
        " &
        # Wait until the mock server is actually accepting connections (avoids race condition)
        for i in {1..10}; do
          curl -sf http://localhost:11434/api/tags && break
          sleep 0.5
        done

    - name: Run tests with coverage
      env:
        JIO_RAG_API_KEY: "ci-test-key-12345"
        ALLOWED_ORIGINS: "http://localhost:3000"
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=75
